<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小猫快跑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑"}
body{display:flex;flex-direction:column;align-items:center;background:#cce5ff;padding:10px;min-height:100vh;}
#canvas{border:3px solid #2277dd;background:#71c5cf;max-width:100%;height:70vh;}
.info{font-size:18px;margin:8px 0;display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.tip{font-size:14px;color:#333;margin-bottom:8px;}
#back{padding:10px 22px;background:#2277dd;color:#fff;border:none;border-radius:8px;font-size:16px;margin-top:12px;cursor:pointer;}
</style>
</head>
<body>
<div class="info">得分：<span id="score">0</span>｜最高纪录：<span id="max">0</span></div>
<div class="tip">电脑按空格｜手机点击屏幕让小猫跳跃躲避障碍</div>
<canvas id="canvas" width="320" height="480"></canvas>
<button id="back">返回主页</button>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const scoreDom = document.getElementById("score");
const maxDom = document.getElementById("max");
document.getElementById("back").onclick = ()=>location.href="./index.html";

// 头像路径不变，读取images文件夹里的头像
const catImg = new Image();
catImg.src = "./images/head.jpg";

let maxScore = localStorage.getItem("catRunMax") || 0;
maxDom.innerText = maxScore;

// 游戏基础参数
const catWidth = 36;
const catHeight = 36;
let catY = canvas.height - catHeight - 10;
const groundY = canvas.height - 10;
let jumpPower = -11;
let gravity = 0.45;
let verticalSpeed = 0;
let isJumping = false;

// 障碍物数组
let obstacles = [];
let obsSpeed = 3;
let score = 0;
let gameOver = false;

// 跳跃逻辑
function jump(){
    if(gameOver){
        restartGame();
        return;
    }
    if(!isJumping){
        verticalSpeed = jumpPower;
        isJumping = true;
    }
}

// 电脑空格、手机点击触发跳跃
document.addEventListener("keydown", e => {
    if(e.code === "Space") jump();
});
canvas.addEventListener("click", jump);

// 生成障碍物
function createObstacle(){
    const obsW = 32;
    const obsH = 42;
    obstacles.push({
        x: canvas.width,
        w: obsW,
        h: obsH
    });
}

// 重置游戏
function restartGame(){
    catY = groundY - catHeight;
    verticalSpeed = 0;
    isJumping = false;
    obstacles = [];
    score = 0;
    obsSpeed = 3;
    gameOver = false;
    scoreDom.innerText = score;
}

// 碰撞检测
function checkCollision(){
    const catX = 40;
    const catTop = catY;
    const catBottom = catY + catHeight;
    const catLeft = catX;
    const catRight = catX + catWidth;

    for(let obs of obstacles){
        const obsLeft = obs.x;
        const obsRight = obs.x + obs.w;
        const obsTop = groundY - obs.h;
        const obsBottom = groundY;

        if(catRight > obsLeft + 4 && catLeft < obsRight - 4){
            if(catBottom > obsTop + 3){
                return true;
            }
        }
    }
    return false;
}

// 游戏主循环
function loop(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if(gameOver){
        // 游戏结束遮罩文字
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "24px 微软雅黑";
        ctx.textAlign = "center";
        ctx.fillText(`游戏结束，得分：${score}`, canvas.width/2, canvas.height/2 - 30);
        ctx.fillText("点击屏幕重新开始", canvas.width/2, canvas.height/2 + 10);
        requestAnimationFrame(loop);
        return;
    }

    // 小猫重力下落
    verticalSpeed += gravity;
    catY += verticalSpeed;
    // 落地判定
    if(catY >= groundY - catHeight){
        catY = groundY - catHeight;
        verticalSpeed = 0;
        isJumping = false;
    }

    // 更新、绘制障碍物
    ctx.fillStyle = "#333333";
    for(let i = obstacles.length - 1; i >= 0; i--){
        const obs = obstacles[i];
        obs.x -= obsSpeed;
        const obsTop = groundY - obs.h;
        ctx.fillRect(obs.x, obsTop, obs.w, obs.h);

        // 障碍物移出屏幕，加分提速
        if(obs.x + obs.w < 0){
            obstacles.splice(i, 1);
            score += 1;
            scoreDom.innerText = score;
            if(score > maxScore){
                maxScore = score;
                localStorage.setItem("catRunMax", maxScore);
                maxDom.innerText = maxScore;
            }
            // 缓慢提速，难度温和
            if(score % 6 === 0 && obsSpeed < 6){
                obsSpeed += 0.3;
            }
        }
    }

    // 定时生成障碍，间隔宽松适合小朋友
    if(Math.floor(Date.now() / 1400) % 1 === 0 && obstacles.length < 2){
        createObstacle();
    }

    // 绘制地面
    ctx.fillStyle = "#555555";
    ctx.fillRect(0, groundY, canvas.width, 10);

    // 绘制小猫（头像）
    if(catImg.complete){
        ctx.drawImage(catImg, 40, catY, catWidth, catHeight);
    }else{
        // 图片加载失败兜底色块
        ctx.fillStyle = "#ffb366";
        ctx.fillRect(40, catY, catWidth, catHeight);
    }

    // 碰撞检测
    if(checkCollision()){
        gameOver = true;
    }

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
