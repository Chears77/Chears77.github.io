<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>荣誉墙 · Alisa</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========== Top Bar ========== -->
<nav class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="topbar-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回首页
    </a>
    <span class="topbar-title">荣誉墙</span>
    <span style="width:80px"></span>
  </div>
</nav>

<!-- ========== Content ========== -->
<div class="page-content">
  <p style="text-align:center; color:var(--text-light); margin-bottom:var(--space-xl);">
    &#127942; 每一份荣誉，都是成长的闪光点
  </p>

  <!-- Year Filter -->
  <div class="year-filter" id="yearFilter">
    <button class="year-filter-btn active" data-year="all">全部</button>
    <button class="year-filter-btn" data-year="2026">2026</button>
    <button class="year-filter-btn" data-year="2025">2025</button>
    <button class="year-filter-btn" data-year="2024">2024</button>
    <button class="year-filter-btn" data-year="2023">2023</button>
    <button class="year-filter-btn" data-year="2022">2022</button>
    <button class="year-filter-btn" data-year="2021">2021</button>
  </div>

  <div class="award-grid" id="awardGrid"></div>
</div>

<!-- ========== Footer ========== -->
<footer class="footer">
  <div class="footer-hearts">&#10084; &#10084; &#10084;</div>
  <p class="footer-quote">"每一份努力都值得被看见"</p>
  <p class="footer-copy">&copy; 2015 &mdash; 2026 Alisa 成长纪念册</p>
</footer>

<script src="js/main.js"></script>
<script>
var awards = [
  { icon: '&#127942;', title: '三好学生', year: '2026', detail: '下学期' },
  { icon: '&#127942;', title: '三好学生', year: '2025', detail: '上、下学期' },
  { icon: '&#127942;', title: '三好学生', year: '2024', detail: '上、下学期' },
  { icon: '&#127942;', title: '三好学生', year: '2023', detail: '上、下学期' },
  { icon: '&#127942;', title: '三好学生', year: '2022', detail: '下学期' },
  { icon: '&#127942;', title: '三好学生', year: '2021', detail: '下学期' },
  { icon: '&#127912;', title: '绘画比赛一等奖', year: '2024', detail: '校级 ·《春天的花园》' },
  { icon: '&#127939;', title: '运动会跑步冠军', year: '2023', detail: '校级 · 200米' },
  { icon: '&#128218;', title: '阅读之星', year: '2025', detail: '校级 · 年度评选' },
  { icon: '&#128218;', title: '阅读之星', year: '2024', detail: '校级 · 年度评选' },
  { icon: '&#128218;', title: '阅读之星', year: '2023', detail: '校级 · 年度评选' },
  { icon: '&#128218;', title: '阅读之星', year: '2022', detail: '校级 · 年度评选' },
  { icon: '&#127891;', title: '优秀少先队员', year: '2022', detail: '校级' },
  { icon: '&#128172;', title: '朗诵比赛二等奖', year: '2024', detail: '校级' },
  { icon: '&#9997;', title: '书法优秀奖', year: '2023', detail: '校级' },
  { icon: '&#127757;', title: '环保小卫士', year: '2025', detail: '社区' },
  { icon: '&#127939;', title: '运动会接力亚军', year: '2024', detail: '校级 · 4×100米' },
  { icon: '&#127912;', title: '手抄报比赛二等奖', year: '2025', detail: '校级' }
];

(function build() {
  var container = document.getElementById('awardGrid');

  function render(filter) {
    container.innerHTML = '';
    var filtered = filter === 'all' ? awards : awards.filter(function(a) { return a.year === filter; });
    filtered.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'award-card fade-in';
      div.innerHTML =
        '<div class="award-icon">' + item.icon + '</div>' +
        '<h4>' + item.title + '</h4>' +
        '<p>' + item.year + ' · ' + item.detail + '</p>';
      container.appendChild(div);
    });
  }

  render('all');

  // Year filter
  document.getElementById('yearFilter').addEventListener('click', function(e) {
    if (!e.target.classList.contains('year-filter-btn')) return;
    document.querySelectorAll('.year-filter-btn').forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
    render(e.target.dataset.year);
  });
})();
</script>
</body>
</html>
