  <style>
   :root {
  --pink: #F8C8D8; --pink-dark: #E8A0B8; --pink-light: #FDE8EF;
  --cream: #FFF8F0; --white: #FFFFFF;
  --text: #5D4E4E; --text-light: #9B8E8E; --text-dark: #3D3030;
  --space-lg: 24px; --space-xl: 32px; --space-2xl: 48px;
  --radius-md: 16px; --shadow-sm: 0 2px 8px rgba(248,200,216,0.15);
  --font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  --font-base: 17px; --font-xl: 28px; --font-sm: 14px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-family);font-size:var(--font-base);color:var(--text);background:var(--cream);line-height:2;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);box-shadow:0 2px 12px rgba(0,0,0,0.05);height:56px;display:flex;align-items:center;padding:0 var(--space-lg)}
.topbar a{display:flex;align-items:center;gap:8px;color:var(--pink-dark);font-weight:600;text-decoration:none}
.topbar a:hover{color:var(--pink)}
.article-page{max-width:800px;margin:0 auto;padding:var(--space-2xl) var(--space-lg)}
.article-title{font-size:var(--font-xl);color:var(--pink-dark);font-weight:700;margin-bottom:8px;line-height:1.4;text-align:center}
.article-date{font-size:var(--font-sm);color:var(--text-light);margin-bottom:var(--space-xl);text-align:center}
.article-body{font-size:var(--font-base);color:var(--text);line-height:2}
.article-body p{margin-bottom:20px;text-indent:2em}
.article-body img{max-width:100%;display:block;margin:20px auto;border-radius:var(--radius-md);box-shadow:var(--shadow-sm)}
.article-body .img{display:block;text-align:center;margin:20px 0}
.article-footer{margin-top:var(--space-2xl);padding-top:var(--space-lg);border-top:1px solid var(--pink-light);text-align:center;color:var(--text-light);font-size:var(--font-sm)}
@media(max-width:767px){.article-title{font-size:22px}}
  </style>
 </head>
 <body>
  <div class="topbar">
   <a href="javascript:history.back()">

     </polyline>
    </svg>
    返回
   </a>
  </div>
  <div class="article-page">
   <h1 class="article-title">
    清明出游
   </h1>
   <p class="article-date">
    2026-04-05
   </p>
   <div class="article-body">
    <p>
     梨花风起正清明，携子寻春半出城。
    </p>
    <p>
     平乐烟光藏古意，凤栖山色入云清。
    </p>
    <p>
     童言笑语随春远，野趣闲欢伴日晴。
    </p>
    <p>
     不负人间好时节，一襟风月慰平生。
    </p>
    <p>
     （梨花风起正清明，携子寻春半出城。  
清明小长假，带娃赴一场春日之约～  
漫步平乐古镇，感受古镇烟火；  
闲行凤栖山林，尽享清幽静谧。  
阳光正好，绿树成荫，  
和小伙伴们相聚山野，踏青闲谈，  
自在又惬意，不负大好春光🌿）
    </p>
