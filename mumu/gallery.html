<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>相册画廊 · Alisa</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========== Top Bar ========== -->
<nav class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="topbar-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回首页
    </a>
    <span class="topbar-title">相册画廊</span>
    <span style="width:80px"></span>
  </div>
</nav>

<!-- ========== Content ========== -->
<div class="page-content">
  <p style="text-align:center; color:var(--text-light); margin-bottom:var(--space-xl);">
    &#128247; 每一张照片，都是时光的标本
  </p>

  <div class="masonry" id="masonryGallery"></div>
</div>

<!-- ========== Footer ========== -->
<footer class="footer">
  <div class="footer-hearts">&#10084; &#10084; &#10084;</div>
  <p class="footer-quote">"最好的相机，是父母的眼睛"</p>
  <p class="footer-copy">&copy; 2015 &mdash; 2026 Alisa 成长纪念册</p>
</footer>

<!-- ========== Lightbox ========== -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" aria-label="关闭">&times;</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <p class="lightbox-caption" id="lightboxCaption"></p>
  <button class="lightbox-nav lightbox-prev" aria-label="上一张">&#10094;</button>
  <button class="lightbox-nav lightbox-next" aria-label="下一张">&#10095;</button>
</div>

<script src="js/main.js"></script>
<script>
var photos = [
  { caption: '春日公园野餐', w: 180 },
  { caption: '生日派对的欢笑', w: 220 },
  { caption: '第一次骑自行车', w: 160 },
  { caption: '海边的小脚印', w: 200 },
  { caption: '和好朋友的合影', w: 170 },
  { caption: '秋日落叶中的奔跑', w: 210 },
  { caption: '圣诞节的小惊喜', w: 190 },
  { caption: '运动会的冲刺瞬间', w: 180 },
  { caption: '图书馆的安静午后', w: 200 },
  { caption: '旅途中灿烂的笑容', w: 160 },
  { caption: '画室里的小艺术家', w: 220 },
  { caption: '雨天的彩色雨靴', w: 180 },
  { caption: '新学期的第一天', w: 170 },
  { caption: '和小狗玩耍', w: 200 },
  { caption: '春天赏花', w: 190 },
  { caption: '做手工的专注时刻', w: 210 }
];

(function build() {
  var container = document.getElementById('masonryGallery');
  photos.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'masonry-item fade-in';
    div.innerHTML =
      '<div class="masonry-img">' +
        '<div class="placeholder-img" data-type="photo" style="min-height:' + item.w + 'px">' +
          '<svg width="40" height="40" viewBox="0 0 48 48" fill="none" opacity="0.35">' +
            '<rect x="8" y="10" width="32" height="24" rx="3" stroke="var(--pink-dark)" stroke-width="1.5"/>' +
            '<circle cx="24" cy="22" r="5" stroke="var(--pink-dark)" stroke-width="1.5"/>' +
            '<rect x="18" y="8" width="12" height="4" rx="1" stroke="var(--pink-dark)" stroke-width="1"/>' +
          '</svg>' +
        '</div>' +
      '</div>' +
      '<p class="masonry-caption">' + item.caption + '</p>';
    container.appendChild(div);
  });
})();
</script>
</body>
</html>
