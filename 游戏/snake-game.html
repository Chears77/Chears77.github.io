<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>贪吃狗 🐕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    display:flex;flex-direction:column;align-items:center;
    background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    min-height:100vh;padding:10px;font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    color:#fff;user-select:none;-webkit-user-select:none;
}
.game-container{
    background:rgba(255,255,255,0.06);
    border-radius:16px;padding:16px;
    backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);
    max-width:420px;width:100%;
}
.score-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:0 4px 12px 4px;font-size:15px;
}
.score-bar span{color:rgba(255,255,255,0.6);}
.score-bar .num{color:#ffd700;font-weight:700;font-size:18px;}
canvas{
    display:block;margin:0 auto;
    border-radius:10px;background:#0d1b2a;
    width:100%;max-width:388px;height:auto;
    touch-action:none;
}
.controls{
    display:flex;justify-content:center;gap:10px;margin-top:14px;flex-wrap:wrap;
}
.btn{
    padding:8px 20px;border:none;border-radius:8px;
    font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;
    font-family:inherit;text-decoration:none;
}
.btn-primary{background:#e94560;color:#fff;}
.btn-primary:hover{background:#ff6b81;transform:translateY(-1px);}
.btn-secondary{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);}
.btn-secondary:hover{background:rgba(255,255,255,0.2);}
.dpad{
    display:grid;grid-template-columns:repeat(3,56px);gap:4px;
    justify-content:center;margin-top:12px;
}
.dpad button{
    height:48px;border:none;border-radius:8px;
    background:rgba(255,255,255,0.08);color:#fff;
    font-size:20px;cursor:pointer;transition:background .15s;
    touch-action:none;
}
.dpad button:active{background:rgba(255,255,255,0.2);}
.dpad .empty{visibility:hidden;}
.game-over-overlay{
    display:none;position:fixed;inset:0;z-index:10;
    background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
    justify-content:center;align-items:center;
}
.game-over-overlay.show{display:flex;}
.game-over-box{
    background:linear-gradient(135deg,#1a1a2e,#16213e);
    padding:32px 40px;border-radius:16px;text-align:center;
    border:1px solid rgba(255,255,255,0.1);
    animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.game-over-box h2{font-size:24px;margin-bottom:8px;}
.game-over-box .final-score{font-size:36px;color:#ffd700;font-weight:700;margin:8px 0 16px;}
.game-over-box .btns{display:flex;gap:12px;justify-content:center;}
.tip{font-size:12px;color:rgba(255,255,255,0.4);margin-top:10px;}
</style>
</head>
<body>

<div class="game-container">
    <div class="score-bar">
        <div><span class="num" id="score">0</span></div>
        <div>最高 <span class="num" id="highScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="388" height="388"></canvas>
    <div class="controls">
        <button class="btn btn-primary" id="restartBtn">🔄 重新开始</button>
        <a href="../index.html" class="btn btn-secondary">🏠 回到主页</a>
    </div>
    <div class="dpad" id="dpad">
        <div></div>
        <button data-dir="up">▲</button>
        <div></div>
        <button data-dir="left">◀</button>
        <button data-dir="down">▼</button>
        <button data-dir="right">▶</button>
    </div>
    <div class="tip">↑↓←→ 或滑动屏幕控制方向</div>
</div>

<div class="game-over-overlay" id="gameOverOverlay">
    <div class="game-over-box">
        <h2>😵 游戏结束</h2>
        <div class="final-score" id="finalScore">0</div>
        <div class="btns">
            <button class="btn btn-primary" id="restartOverlayBtn">🔄 再来一局</button>
            <a href="../index.html" class="btn btn-secondary">🏠 主页</a>
        </div>
    </div>
</div>

<script>
(function(){
    const canvas=document.getElementById('gameCanvas');
    const ctx=canvas.getContext('2d');
    const scoreEl=document.getElementById('score');
    const highScoreEl=document.getElementById('highScore');
    const finalScoreEl=document.getElementById('finalScore');
    const gameOverOverlay=document.getElementById('gameOverOverlay');

    // Grid
    const GRID=16, SIZE=canvas.width/GRID;
    let snake, food, dir, nextDir, score, highScore, running, gameLoop;

    // Dog head image
    const dogImg=new Image();
    dogImg.src='../images/head.jpg';

    // High score from localStorage
    highScore=parseInt(localStorage.getItem('snakeHighScore'))||0;
    highScoreEl.textContent=highScore;

    function init(){
        snake=[{x:7,y:8},{x:6,y:8},{x:5,y:8}];
        dir='right';nextDir='right';
        score=0;
        scoreEl.textContent='0';
        gameOverOverlay.classList.remove('show');
        running=true;
        spawnFood();
        draw();
    }

    function spawnFood(){
        let pos;
        do{
            pos={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};
        }while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
        food=pos;
    }

    function update(){
        if(!running)return;
        dir=nextDir;
        const head={x:snake[0].x,y:snake[0].y};
        if(dir==='right')head.x++;
        else if(dir==='left')head.x--;
        else if(dir==='up')head.y--;
        else if(dir==='down')head.y++;

        // Wall death
        if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID){
            gameOver();return;
        }

        // Self collision
        if(snake.some(s=>s.x===head.x&&s.y===head.y)){
            gameOver();return;
        }

        snake.unshift(head);
        if(head.x===food.x&&head.y===food.y){
            score++;
            scoreEl.textContent=score;
            if(score>highScore){
                highScore=score;
                localStorage.setItem('snakeHighScore',highScore);
                highScoreEl.textContent=highScore;
            }
            spawnFood();
        }else{
            snake.pop();
        }
        draw();
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        // Grid lines
        ctx.strokeStyle='rgba(255,255,255,0.04)';
        ctx.lineWidth=1;
        for(let i=0;i<=GRID;i++){
            ctx.beginPath();ctx.moveTo(i*SIZE,0);ctx.lineTo(i*SIZE,canvas.height);ctx.stroke();
            ctx.beginPath();ctx.moveTo(0,i*SIZE);ctx.lineTo(canvas.width,i*SIZE);ctx.stroke();
        }

        // Food - glowing circle
        const fx=food.x*SIZE+SIZE/2,fy=food.y*SIZE+SIZE/2;
        const grad=ctx.createRadialGradient(fx,fy,2,fx,fy,SIZE/2);
        grad.addColorStop(0,'#ff6b6b');
        grad.addColorStop(0.6,'#ee5a24');
        grad.addColorStop(1,'rgba(238,90,36,0)');
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.arc(fx,fy,SIZE/2,0,Math.PI*2);ctx.fill();

        ctx.fillStyle='#ff4757';
        ctx.beginPath();ctx.arc(fx,fy,SIZE/2-3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(fx-3,fy-3,2,0,Math.PI*2);ctx.fill();

        // Snake body
        for(let i=0;i<snake.length;i++){
            const s=snake[i],x=s.x*SIZE,y=s.y*SIZE;
            if(i===0){
                // Head - draw dog image
                ctx.save();
                ctx.beginPath();
                ctx.arc(x+SIZE/2,y+SIZE/2,SIZE/2-1,0,Math.PI*2);
                ctx.clip();
                ctx.drawImage(dogImg,x,y,SIZE,SIZE);
                ctx.restore();
                // Outline
                ctx.strokeStyle='rgba(255,215,0,0.5)';
                ctx.lineWidth=2;
                ctx.beginPath();
                ctx.arc(x+SIZE/2,y+SIZE/2,SIZE/2-1,0,Math.PI*2);
                ctx.stroke();
            }else{
                const ratio=i/snake.length;
                const r=Math.round(40+ratio*30);
                const g=Math.round(180-ratio*60);
                const b=Math.round(120-ratio*40);
                ctx.fillStyle=`rgb(${r},${g},${b})`;
                const pad=2;
                ctx.beginPath();
                ctx.roundRect(x+pad,y+pad,SIZE-pad*2,SIZE-pad*2,4);
                ctx.fill();
            }
        }

        // Eyes on head direction
        // (dog image already has eyes, but let's add indicators)
        const hx=snake[0].x*SIZE+SIZE/2,hy=snake[0].y*SIZE+SIZE/2;
        ctx.fillStyle='rgba(255,255,255,0.3)';
        if(dir==='right'){
            ctx.beginPath();ctx.arc(hx+5,hy-4,2,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(hx+5,hy+4,2,0,Math.PI*2);ctx.fill();
        }else if(dir==='left'){
            ctx.beginPath();ctx.arc(hx-5,hy-4,2,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(hx-5,hy+4,2,0,Math.PI*2);ctx.fill();
        }else if(dir==='up'){
            ctx.beginPath();ctx.arc(hx-4,hy-5,2,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(hx+4,hy-5,2,0,Math.PI*2);ctx.fill();
        }else{
            ctx.beginPath();ctx.arc(hx-4,hy+5,2,0,Math.PI*2);ctx.fill();
            ctx.beginPath();ctx.arc(hx+4,hy+5,2,0,Math.PI*2);ctx.fill();
        }
    }

    function gameOver(){
        running=false;
        clearInterval(gameLoop);
        finalScoreEl.textContent=score;
        gameOverOverlay.classList.add('show');
    }

    // Input
    function setDir(d){
        const opposites={up:'down',down:'up',left:'right',right:'left'};
        if(d!==opposites[dir])nextDir=d;
    }

    document.addEventListener('keydown',e=>{
        if(!running)return;
        if(e.key.startsWith('Arrow')){
            e.preventDefault();
            setDir(e.key.slice(5).toLowerCase());
        }
        if(e.key===' '){e.preventDefault();}
    });

    // DPAD
    document.querySelectorAll('[data-dir]').forEach(btn=>{
        btn.addEventListener('click',()=>setDir(btn.dataset.dir));
        btn.addEventListener('touchstart',e=>{e.preventDefault();setDir(btn.dataset.dir);});
    });

    // Touch swipe
    let tx=0,ty=0;
    canvas.addEventListener('touchstart',e=>{
        const t=e.touches[0];
        tx=t.clientX;ty=t.clientY;
    });
    canvas.addEventListener('touchend',e=>{
        if(!running)return;
        const t=e.changedTouches[0];
        const dx=t.clientX-tx,dy=t.clientY-ty;
        if(Math.abs(dx)>Math.abs(dy)){
            setDir(dx>0?'right':'left');
        }else if(Math.abs(dy)>10){
            setDir(dy>0?'down':'up');
        }
    });

    // Restart
    function restartGame(){
        clearInterval(gameLoop);
        init();
        gameLoop=setInterval(update,150);
    }
    document.getElementById('restartBtn').addEventListener('click',restartGame);
    document.getElementById('restartOverlayBtn').addEventListener('click',restartGame);

    // Start
    init();
    gameLoop=setInterval(update,150);
})();
</script>
</body>
</html>
