<!DOCTYPE HTML>

<head>
    <title>文章列表 - 安即是佛</title>

    <link rel="stylesheet" href="../assets/css/main.css" />

    <style>
        /* ─── Article Listing Page Styles ─── */
        #article-header {
            padding: 1.2em 0 0.8em;
            text-align: center;
            background: linear-gradient(135deg, #2a2624 0%, #1a1714 100%);
            color: #fff;
            position: relative;
        }
        #article-header h1 {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 0.1em;
        }
        #article-header p {
            font-size: 0.9em;
            color: #bbb;
        }
        #article-header .back-link {
            position: absolute;
            top: 1em;
            right: 1.5em;
            color: #a0825a;
            text-decoration: none;
            font-size: 0.85em;
            transition: color 0.2s;
        }
        #article-header .back-link:hover { color: #c8a87a; }
        

        .articles-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5em 2em 3em;
        }

        /* Article Card */
        .article-card {
            display: flex;
            gap: 1em;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            margin-bottom: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 1px solid #eee;
        }
        .article-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(0,0,0,0.1);
        }
        .article-card .card-thumb {
            flex: 0 0 55px; min-height: 55px;
            background: #f5f3ee;
            overflow: hidden;
        }
        .article-card .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover; border-radius: 50%;
            display: block;
        }
        .article-card .card-thumb .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 1.8em;
        }
        .article-card .card-body {
            flex: 1;
            padding: 0.6em 1em 0.6em 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .article-card .card-date {
            font-size: 0.7em;
            color: #a0825a;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 0.5em;
            font-family: sans-serif;
        }
        .article-card .card-title {
            font-size: 1em;
            font-weight: 700;
            color: #1a1714;
            line-height: 1.5;
            margin-bottom: 0.5em;
        }
        .article-card .card-footer {
            display: flex;
            align-items: center;
            gap: 1em;
            margin-top: auto;
        }
        .article-card .card-footer .read-more {
            font-size: 0.85em;
            color: #a0825a;
            font-weight: 600;
            font-family: sans-serif;
            text-decoration: none;
        }
        .article-card .card-footer .read-more i {
            margin-left: 0.3em;
            transition: margin-left 0.2s;
        }
        .article-card:hover .card-footer .read-more i {
            margin-left: 0.6em;
        }

        /* Loading & Empty States */
        .loading-state, .empty-state {
            text-align: center;
            padding: 4em 2em;
            color: #999;
        }
        .loading-state i {
            font-size: 2em;
            margin-bottom: 0.5em;
            display: block;
        }
        .empty-state i {
            font-size: 3em;
            margin-bottom: 0.5em;
            display: block;
            color: #ddd;
        }

        /* Footer */
        #article-footer {
            text-align: center;
            padding: 2em;
            color: #999;
            font-size: 0.85em;
            border-top: 1px solid #eee;
        }

        @media screen and (max-width: 600px) {
            .article-card {
                flex-direction: row;
            }
            .article-card .card-thumb {
                flex: 0 0 50px; min-height: 50px;
                width: auto;
            }
            .article-card .card-body {
                padding: 1em 1.2em;
            }
            #article-header h1 {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 0.1em;
        }
            .articles-wrapper { padding: 1em 1em 2em; }
        }
    </style>
</head>
<body class="">

    <!-- Header -->
    <header id="article-header">
        <a href="../index.html" class="back-link">← 返回首页</a>
        <h1>📝 文章列表</h1>
        <p>记录思考，沉淀认知</p>

    <!-- Articles List -->
    <div class="articles-wrapper" id="articles-container">
        <div class="loading-state">
            <i class="icon solid fa-spinner fa-pulse"></i>
            加载文章中...
        </div>
    </div>

    <!-- Footer -->
    <footer id="article-footer">
        <ul class="icons">
            <li><a href="../index.html" class="icon solid fa-home"><span class="label">首页</span></a></li>
        </ul>
        <p class="copyright">&copy; 安即是佛. Credits: <a href="http://html5up.net">HTML5 UP</a></p>
    </footer>

    <!-- Scripts -->
    <script src="../assets/js/jquery.min.js"></script>
    <script src="../assets/js/jquery.scrolly.min.js"></script>
    <script src="../assets/js/browser.min.js"></script>
    <script src="../assets/js/breakpoints.min.js"></script>
    <script src="../assets/js/util.js"></script>
    <script src="../assets/js/main.js"></script>

    <script>

    </script>

<script>
    (function() {
        var container = document.getElementById('articles-container');

        function renderArticles(articles) {
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="icon solid fa-book-open"></i><p>暂无文章，敬请期待</p></div>';
                return;
            }

            var html = '';
            for (var i = 0; i < articles.length; i++) {
                var a = articles[i];
                var thumbHtml = '';
                if (a.thumbnail) {
                    thumbHtml = '<img src="' + encodeURI(a.thumbnail) + '" alt="' + a.title + '" loading="lazy" onerror="this.remove()" />';
                } else {
                    thumbHtml = '<div class="placeholder"><i class="icon solid fa-file-alt"></i></div>';
                }

                html += '<a href="' + encodeURI(a.path) + '" class="article-card" target="_blank">' +
                    '<div class="card-thumb">' + thumbHtml + '</div>' +
                    '<div class="card-body">' +
                        '<div class="card-date"><i class="icon solid fa-calendar-alt" style="margin-right:0.3em;"></i>' + a.date + '</div>' +
                        '<div class="card-title">' + escapeHtml(a.title) + '</div>' +
                        '<div class="card-footer">' +
                            '<span class="read-more">阅读全文 <i class="icon solid fa-arrow-right"></i></span>' +
                        '</div>' +
                    '</div>' +
                '</a>';
            }
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Use inline data first (local file://), fallback to fetch (GitHub Pages)
        if (typeof __articlesData !== "undefined" && __articlesData) {
            renderArticles(__articlesData);
        } else {
            fetch('./articles.json?t=' + Date.now())
                .then(function(r) { return r.json(); })
                .then(function(data) { renderArticles(data); })
                .catch(function(err) {
                    container.innerHTML = '<div class="empty-state"><i class="icon solid fa-exclamation-triangle" style="color:#c00;"></i><p>文章加载失败，请稍后重试</p></div>';
                    console.error('Failed to load articles:', err);
                });
        }
    })();
    </script>

<script>
// Fallback: ensure is-preload is removed even if jQuery fails on file://
window.addEventListener('load', function() {
    setTimeout(function() {
        document.body.classList.remove('is-preload');
    }, 100);
});
</script>

</html>
