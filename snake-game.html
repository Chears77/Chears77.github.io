<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 手机适配核心标签 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>专属贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑"}
body{
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#f0f7ff;
    padding:10px 5px;
    min-height:100vh;
}
#gameCanvas{
    border:4px solid #2563eb;
    background:#fff;
    /* 手机自动缩小画布，不超出屏幕 */
    max-width:100%;
    height:auto;
}
.info{
    font-size:18px;
    margin:8px 0;
    gap:15px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.tips{
    color:#555;
    margin-bottom:8px;
    text-align:center;
    font-size:14px;
    padding:0 10px;
}
#backHome{
    margin-top:12px;
    padding:10px 24px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>
<div class="info">当前得分：<span id="score">0</span>｜历史最高分：<span id="maxScore">0</span></div>
<div class="tips">电脑：方向键控制｜手机：手指滑动屏幕控制</div>
<canvas id="gameCanvas" width="420" height="420"></canvas>
<button id="backHome">返回个人主页</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDom = document.getElementById("score");
const maxScoreDom = document.getElementById("maxScore");
document.getElementById("backHome").onclick = ()=>location.href="./index.html";

// ===================== 头像路径已修改 =====================
// 将head.jpg放入网站根目录 images 文件夹内
const headImg = new Image();
headImg.src = "./images/head.jpg"; 
// ======================================================

const grid = 21;
let snake = [{x:10,y:10}];
let food = {};
let dir = "right",nextDir = "right";
let score = 0;
let maxScore = localStorage.getItem("snakeMax") || 0;
maxScoreDom.innerText = maxScore;

// 随机生成食物
function createFood(){
    return {
        x:Math.floor(Math.random()*(canvas.width/grid)),
        y:Math.floor(Math.random()*(canvas.height/grid))
    }
}
food = createFood();

// 电脑键盘控制
document.addEventListener("keydown",e=>{
    switch(e.key){
        case "ArrowUp":if(dir!=="down")nextDir="up";break;
        case "ArrowDown":if(dir!=="up")nextDir="down";break;
        case "ArrowLeft":if(dir!=="right")nextDir="left";break;
        case "ArrowRight":if(dir!=="left")nextDir="right";break;
    }
})

// 手机触屏滑动控制（新增适配）
let touchStartX = 0;
let touchStartY = 0;
canvas.addEventListener("touchstart", e=>{
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
})
canvas.addEventListener("touchend", e=>{
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const diffX = endX - touchStartX;
    const diffY = endY - touchStartY;
    // 判断滑动方向
    if(Math.abs(diffX) > Math.abs(diffY)){
        // 左右滑动
        if(diffX > 30 && dir !== "left") nextDir = "right";
        if(diffX < -30 && dir !== "right") nextDir = "left";
    }else{
        // 上下滑动
        if(diffY > 30 && dir !== "up") nextDir = "down";
        if(diffY < -30 && dir !== "down") nextDir = "up";
    }
})

// 游戏主循环
function loop(){
    dir = nextDir;
    let head = {...snake[0]};
    switch(dir){
        case "up":head.y--;break;
        case "down":head.y++;break;
        case "left":head.x--;break;
        case "right":head.x++;break;
    }
    // 撞墙判断
    if(head.x<0||head.y<0||head.x>=canvas.width/grid||head.y>=canvas.height/grid){
        gameOver();return;
    }
    // 撞到自身
    for(let item of snake){
        if(item.x===head.x&&item.y===head.y){
            gameOver();return;
        }
    }
    snake.unshift(head);
    // 吃到食物
    if(head.x===food.x&&head.y===food.y){
        score +=10;
        scoreDom.innerText = score;
        food = createFood();
        if(score>maxScore){
            maxScore = score;
            localStorage.setItem("snakeMax",maxScore);
            maxScoreDom.innerText = maxScore;
        }
    }else{
        snake.pop();
    }
    // 清空画布
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // 绘制食物 红色苹果
    ctx.fillStyle="#ef4444";
    ctx.fillRect(food.x*grid,food.y*grid,grid-1,grid-1);
    // 绘制蛇身体
    ctx.fillStyle="#3b82f6";
    for(let i=1;i<snake.length;i++){
        ctx.fillRect(snake[i].x*grid,snake[i].y*grid,grid-1,grid-1);
    }
    // 绘制自定义头像蛇头
    if(headImg.complete){
        ctx.drawImage(headImg,snake[0].x*grid,snake[0].y*grid,grid,grid);
    }else{
        // 图片加载失败兜底蓝色方块
        ctx.fillStyle="#1d4ed8";
        ctx.fillRect(snake[0].x*grid,snake[0].y*grid,grid,grid);
    }
}

// 游戏结束弹窗
function gameOver(){
    clearInterval(gameTimer);
    alert(`游戏结束！本次得分：${score}\n历史最高分：${maxScore}\n刷新页面重新开始`);
}

// 游戏速度，数字越小速度越快
const gameTimer = setInterval(loop,130);
</script>
</body>
</html>
